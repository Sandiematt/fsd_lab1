<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCare Pharmacy - Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span>💊</span>
                <span>MediCare Pharmacy</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">🏠 Home</a></li>
                <li><a href="inventory.html">📦 Inventory</a></li>
                <li><a href="cart.html" style="position: relative;">
                    🛒 Cart
                    <span class="cart-badge" id="cartBadge" style="display: none;">0</span>
                </a></li>
                <li><a href="profile.html" class="active">👤 Profile</a></li>
                <li><a href="about.html">ℹ️ About</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <div class="section-header">
            <h1>User Profile</h1>
            <p>Manage your account details and view your order history.</p>
        </div>

        <div class="profile-layout">
            <!-- Left Side: Profile Form -->
            <div class="profile-card">
                <h3>Personal Details</h3>
                <form id="profileForm">
                    <div class="form-group">
                        <label for="profileName">Full Name</label>
                        <input type="text" id="profileName" class="form-control" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label for="profileEmail">Email Address</label>
                        <input type="email" id="profileEmail" class="form-control" required placeholder="john.doe@example.com">
                    </div>
                    <div class="form-group">
                        <label for="profilePhone">Phone Number</label>
                        <input type="tel" id="profilePhone" class="form-control" required placeholder="+1 (555) 000-0000">
                    </div>
                    <div class="form-group">
                        <label for="profileAddress">Shipping Address</label>
                        <textarea id="profileAddress" class="form-control" rows="4" required placeholder="123 Health Ave, Wellness City, HW 90210"></textarea>
                    </div>
                    <button type="submit" class="btn-primary btn-block" id="saveProfileBtn">
                        Save Changes
                    </button>
                </form>
            </div>

            <!-- Right Side: Order History -->
            <div class="profile-card">
                <h3>Order History</h3>
                <div class="order-history-list" id="orderHistoryList">
                    <!-- Order cards will be dynamically inserted here -->
                </div>
            </div>
        </div>
    </main>

    <script>
        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('medicareCart') || '[]');
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const badge = document.getElementById('cartBadge');
            if (totalItems > 0) {
                badge.textContent = totalItems;
                badge.style.display = 'flex';
            } else {
                badge.style.display = 'none';
            }
        }

        // Load profile info from localStorage
        function loadProfile() {
            const profile = JSON.parse(localStorage.getItem('medicareProfile') || '{}');
            
            document.getElementById('profileName').value = profile.name || '';
            document.getElementById('profileEmail').value = profile.email || '';
            document.getElementById('profilePhone').value = profile.phone || '';
            document.getElementById('profileAddress').value = profile.address || '';
        }

        // Save profile info to localStorage
        document.getElementById('profileForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const profile = {
                name: document.getElementById('profileName').value,
                email: document.getElementById('profileEmail').value,
                phone: document.getElementById('profilePhone').value,
                address: document.getElementById('profileAddress').value
            };

            localStorage.setItem('medicareProfile', JSON.stringify(profile));
            
            // Show save feedback
            const saveBtn = document.getElementById('saveProfileBtn');
            const originalText = saveBtn.textContent;
            saveBtn.textContent = '✅ Profile Details Saved!';
            saveBtn.disabled = true;
            
            setTimeout(() => {
                saveBtn.textContent = originalText;
                saveBtn.disabled = false;
            }, 1500);
        });

        // Load order history from localStorage with initial default mock seed data
        function loadOrders() {
            let orderHistory = localStorage.getItem('medicareOrderHistory');
            
            // Seed initial order data if history is completely empty
            if (orderHistory === null) {
                const seedOrders = [
                    {
                        id: '#104820',
                        date: 'Jun 2, 2026',
                        total: '$18.47',
                        status: 'Delivered',
                        itemCount: 2
                    },
                    {
                        id: '#102941',
                        date: 'May 15, 2026',
                        total: '$32.99',
                        status: 'Delivered',
                        itemCount: 3
                    }
                ];
                localStorage.setItem('medicareOrderHistory', JSON.stringify(seedOrders));
                orderHistory = JSON.stringify(seedOrders);
            }

            const orders = JSON.parse(orderHistory);
            const listContainer = document.getElementById('orderHistoryList');

            if (orders.length === 0) {
                listContainer.innerHTML = '<p style="color: #717182; text-align: center; padding: 2rem 0;">No orders placed yet.</p>';
                return;
            }

            listContainer.innerHTML = '';
            orders.forEach(order => {
                const statusClass = order.status === 'Delivered' ? 'badge-success' : 'badge-warning';
                
                const cardHTML = `
                    <div class="order-card">
                        <div class="order-card-header">
                            <span>Order ID: ${order.id}</span>
                            <span class="badge ${statusClass}">${order.status}</span>
                        </div>
                        <div class="order-card-details">
                            <span>Date: ${order.date}</span>
                            <span>Items: ${order.itemCount}</span>
                            <span style="font-weight: 500; color: #030213;">Total: ${order.total}</span>
                        </div>
                    </div>
                `;
                listContainer.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        // Initialize Page
        updateCartBadge();
        loadProfile();
        loadOrders();
    </script>
</body>
</html>
